services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # compose interpolates from .env; env_file values are literal
      DATABASE_URL: postgres://tripbook:${POSTGRES_PASSWORD}@db:5432/tripbook
    depends_on:
      db:
        condition: service_healthy
    expose: ["3000"]
    command: sh -c "node db/migrate.mjs && node server.js"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tripbook
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: tripbook
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripbook"]
      interval: 5s
      retries: 10

volumes:
  pgdata:
  caddy_data:
  caddy_config:
